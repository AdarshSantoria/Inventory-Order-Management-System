services:
  - type: web
    name: inventory-order-management-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-order-management-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: inventory-order-management-db
    plan: free
